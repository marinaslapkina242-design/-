<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волна — социальная сеть</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --surface3: #252534;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --accent-glow: rgba(124,92,252,0.18);
    --text: #f0eff8;
    --text2: #9896b0;
    --text3: #5e5c78;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --danger: #fc5c7d;
    --success: #4ade80;
    --warn: #fbbf24;
    --r: 12px;
    --r2: 18px;
    --r3: 24px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Unbounded', sans-serif; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; }

  /* ══════════════════════════════════════
     AUTH PAGE
  ══════════════════════════════════════ */
  #page-auth {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,92,252,0.15) 0%, transparent 70%),
                var(--bg);
  }
  .auth-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 2.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c084fc, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .auth-tagline { color: var(--text2); font-size: 0.95rem; margin-bottom: 2.5rem; letter-spacing: 0.02em; }
  .auth-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 4px;
    margin-bottom: 2rem;
    gap: 4px;
  }
  .auth-tab {
    padding: 0.55rem 1.8rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .auth-tab.active { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(124,92,252,0.4); }
  .auth-form-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r3);
    padding: 2rem 2.5rem;
    width: 380px;
    max-width: 95vw;
  }
  .auth-form { display: none; flex-direction: column; gap: 1rem; }
  .auth-form.active { display: flex; }
  .field-label { font-size: 0.8rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
  .auth-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--r);
    padding: 0.8rem 1.5rem;
    color: #fff;
    font-family: 'Manrope', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .auth-err { color: var(--danger); font-size: 0.85rem; text-align: center; min-height: 1.2em; }

  /* ══════════════════════════════════════
     APP LAYOUT
  ══════════════════════════════════════ */
  #page-app {
    flex-direction: row;
    align-items: stretch;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1rem;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
    gap: 0.3rem;
  }
  .sidebar-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c084fc, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding: 0.5rem 0.75rem 1.5rem;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 0.7rem 0.9rem;
    border-radius: var(--r);
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text2);
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent-glow); color: var(--accent2); font-weight: 600; }
  .nav-icon { font-size: 1.15rem; width: 22px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--danger);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    min-width: 18px;
    text-align: center;
  }
  .sidebar-spacer { flex: 1; }
  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    border-radius: var(--r);
    background: var(--surface2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .sidebar-user:hover { background: var(--surface3); }
  .avatar {
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    font-size: 0.85rem;
    font-family: 'Manrope', sans-serif;
  }
  .sidebar-user-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .sidebar-user-handle { font-size: 0.75rem; color: var(--text3); }

  /* ── MAIN CONTENT ── */
  .main-content {
    margin-left: 260px;
    flex: 1;
    min-height: 100vh;
    max-width: calc(100vw - 260px);
  }
  .section { display: none; padding: 2rem 2.5rem; max-width: 720px; }
  .section.active { display: block; }

  /* ── SECTION HEADER ── */
  .section-title {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  /* ── FEED ── */
  .create-post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .create-post-top {
    display: flex;
    gap: 0.9rem;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .create-post textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 0.95rem;
    resize: none;
    outline: none;
    height: 80px;
    transition: border-color 0.2s;
  }
  .create-post textarea:focus { border-color: var(--accent); }
  .create-post-actions { display: flex; justify-content: flex-end; gap: 0.75rem; align-items: center; }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 0.5rem 1.1rem;
    color: var(--text2);
    font-family: 'Manrope', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--r);
    padding: 0.55rem 1.4rem;
    color: #fff;
    font-family: 'Manrope', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-accent:hover { opacity: 0.88; }

  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  .post-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.9rem; }
  .post-meta { flex: 1; }
  .post-author { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .post-time { font-size: 0.78rem; color: var(--text3); }
  .post-body { font-size: 0.95rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
  .post-actions { display: flex; gap: 1rem; align-items: center; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .action-btn {
    display: flex; align-items: center; gap: 0.4rem;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 0.88rem; font-family: 'Manrope', sans-serif;
    padding: 0.35rem 0.6rem; border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  .action-btn:hover { color: var(--accent2); background: var(--accent-glow); }
  .action-btn.liked { color: var(--danger); }
  .action-btn.liked:hover { color: var(--danger); }
  .comments-section { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.9rem; display: none; }
  .comments-section.open { display: block; }
  .comment-item { display: flex; gap: 0.6rem; margin-bottom: 0.75rem; }
  .comment-body { background: var(--surface2); border-radius: 10px; padding: 0.5rem 0.85rem; flex: 1; }
  .comment-author { font-size: 0.8rem; font-weight: 600; color: var(--accent2); margin-bottom: 0.2rem; }
  .comment-text { font-size: 0.88rem; color: var(--text); }
  .comment-input-row { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
  .comment-input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 0.5rem 0.85rem;
    color: var(--text); font-family: 'Manrope', sans-serif; font-size: 0.88rem; outline: none;
    transition: border-color 0.2s;
  }
  .comment-input-row input:focus { border-color: var(--accent); }
  .comment-input-row button {
    background: var(--accent); border: none; border-radius: var(--r);
    padding: 0.5rem 1rem; color: #fff; font-family: 'Manrope', sans-serif;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
  }

  /* ── PROFILE ── */
  .profile-banner {
    height: 160px;
    background: linear-gradient(135deg, rgba(124,92,252,0.5), rgba(192,132,252,0.3));
    border-radius: var(--r2);
    margin-bottom: -50px;
  }
  .profile-info-row {
    display: flex; align-items: flex-end; gap: 1rem;
    padding: 0 1.5rem; margin-bottom: 1.2rem;
  }
  .profile-avatar-wrap { position: relative; }
  .profile-avatar-wrap .avatar {
    width: 90px; height: 90px; font-size: 2rem;
    border: 3px solid var(--bg);
  }
  .profile-names { flex: 1; padding-bottom: 0.5rem; }
  .profile-name { font-size: 1.3rem; font-weight: 700; }
  .profile-handle { font-size: 0.88rem; color: var(--text3); margin-top: 0.2rem; }
  .profile-bio { font-size: 0.92rem; color: var(--text2); margin-top: 0.4rem; }
  .profile-stats { display: flex; gap: 2rem; padding: 0 1.5rem; margin-bottom: 1.5rem; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.2rem; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 0.78rem; color: var(--text3); margin-top: 0.1rem; }
  .profile-edit-btn {
    background: none; border: 1px solid var(--border2); border-radius: var(--r);
    padding: 0.45rem 1.2rem; color: var(--text2); font-family: 'Manrope', sans-serif;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    align-self: flex-end; margin-bottom: 0.5rem;
    transition: background 0.15s, color 0.15s;
  }
  .profile-edit-btn:hover { background: var(--surface2); color: var(--text); }

  /* edit modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--r3); padding: 2rem; width: 420px; max-width: 95vw;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: none; } }
  .modal-title { font-size: 1.1rem; margin-bottom: 1.5rem; }
  .modal-field { margin-bottom: 1rem; }
  .modal-field label { display: block; font-size: 0.8rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
  .modal-field input, .modal-field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--r); padding: 0.7rem 1rem; color: var(--text);
    font-family: 'Manrope', sans-serif; font-size: 0.92rem; outline: none;
    transition: border-color 0.2s;
  }
  .modal-field textarea { resize: vertical; min-height: 70px; }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

  /* ── MESSAGES ── */
  .messages-layout { display: flex; height: calc(100vh - 4rem); gap: 0; }
  .conv-list {
    width: 260px; border-right: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0;
  }
  .conv-list-header { padding: 1rem 1.2rem 0.75rem; font-size: 1rem; font-weight: 700; border-bottom: 1px solid var(--border); }
  .conv-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.85rem 1.2rem; cursor: pointer;
    transition: background 0.15s; border-bottom: 1px solid var(--border);
  }
  .conv-item:hover, .conv-item.active { background: var(--surface2); }
  .conv-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
  .conv-last { font-size: 0.78rem; color: var(--text3); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.7rem; }
  .msg-bubble {
    max-width: 65%; padding: 0.7rem 1rem;
    border-radius: 14px; font-size: 0.9rem; line-height: 1.5;
    animation: fadeIn 0.2s ease;
  }
  .msg-bubble.me {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg-bubble.them {
    background: var(--surface2); color: var(--text);
    align-self: flex-start; border-bottom-left-radius: 4px;
  }
  .msg-time { font-size: 0.72rem; opacity: 0.6; margin-top: 0.25rem; display: block; }
  .chat-input-row {
    padding: 1rem 1.5rem; border-top: 1px solid var(--border);
    display: flex; gap: 0.75rem;
  }
  .chat-input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.65rem 1.2rem;
    color: var(--text); font-family: 'Manrope', sans-serif; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; border-radius: 50%;
    width: 40px; height: 40px; color: #fff; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.85; }
  .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 0.92rem; }

  /* ── FRIENDS ── */
  .friends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .friend-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 1.2rem; text-align: center;
    animation: fadeIn 0.3s ease;
    transition: border-color 0.2s;
  }
  .friend-card:hover { border-color: var(--border2); }
  .friend-card .avatar { width: 56px; height: 56px; margin: 0 auto 0.75rem; font-size: 1.3rem; }
  .friend-name { font-size: 0.92rem; font-weight: 600; margin-bottom: 0.25rem; }
  .friend-handle { font-size: 0.78rem; color: var(--text3); margin-bottom: 0.9rem; }
  .friend-btn {
    background: none; border: 1px solid var(--border2); border-radius: var(--r);
    padding: 0.4rem 1rem; color: var(--text2); font-family: 'Manrope', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; width: 100%;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .friend-btn:hover { background: var(--accent-glow); color: var(--accent2); border-color: var(--accent); }
  .friend-btn.following { background: var(--accent-glow); color: var(--accent2); border-color: var(--accent); }
  .friends-search {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 0.7rem 1rem;
    color: var(--text); font-family: 'Manrope', sans-serif; font-size: 0.92rem;
    outline: none; width: 100%; margin-bottom: 1.5rem;
    transition: border-color 0.2s;
  }
  .friends-search:focus { border-color: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--r); padding: 0.75rem 1.2rem;
    color: var(--text); font-size: 0.88rem; font-weight: 600;
    z-index: 9999; animation: toastIn 0.3s ease;
    display: flex; align-items: center; gap: 0.5rem;
  }
  @keyframes toastIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }

  /* ── MOBILE NAV ── */
  .mobile-nav { display: none; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main-content { margin-left: 0; max-width: 100vw; }
    .section { padding: 1rem 1rem 5rem; }
    .mobile-nav {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 100; padding: 0.5rem;
      justify-content: space-around;
    }
    .mobile-nav .nav-btn { flex-direction: column; gap: 0.2rem; font-size: 0.7rem; padding: 0.4rem; flex: 1; }
    .mobile-nav .nav-icon { font-size: 1.3rem; width: auto; }
    .messages-layout { height: calc(100vh - 9rem); }
  }
</style>
</head>
<body>

<!-- ══════════ AUTH PAGE ══════════ -->
<div id="page-auth" class="page active">
  <div class="auth-logo">Волна</div>
  <div class="auth-tagline">Будь на своей волне. Общайся. Создавай.</div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchAuthTab('login')">Войти</button>
    <button class="auth-tab" onclick="switchAuthTab('register')">Регистрация</button>
  </div>
  <div class="auth-form-wrap">
    <!-- LOGIN -->
    <form id="form-login" class="auth-form active" onsubmit="doLogin(event)">
      <div>
        <div class="field-label">Имя пользователя</div>
        <input class="auth-input" id="login-user" placeholder="@username" autocomplete="username">
      </div>
      <div>
        <div class="field-label">Пароль</div>
        <input class="auth-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="auth-err" id="login-err"></div>
      <button type="submit" class="btn-primary">Войти</button>
    </form>
    <!-- REGISTER -->
    <form id="form-register" class="auth-form" onsubmit="doRegister(event)">
      <div>
        <div class="field-label">Имя</div>
        <input class="auth-input" id="reg-name" placeholder="Твоё имя">
      </div>
      <div>
        <div class="field-label">Имя пользователя</div>
        <input class="auth-input" id="reg-user" placeholder="@username">
      </div>
      <div>
        <div class="field-label">Пароль</div>
        <input class="auth-input" id="reg-pass" type="password" placeholder="Минимум 4 символа">
      </div>
      <div class="auth-err" id="reg-err"></div>
      <button type="submit" class="btn-primary">Создать аккаунт</button>
    </form>
  </div>
</div>

<!-- ══════════ APP PAGE ══════════ -->
<div id="page-app" class="page">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">Волна</div>
    <button class="nav-btn active" onclick="showSection('feed', this)"><span class="nav-icon">🌊</span> Лента</button>
    <button class="nav-btn" onclick="showSection('profile', this)"><span class="nav-icon">👤</span> Профиль</button>
    <button class="nav-btn" onclick="showSection('friends', this)"><span class="nav-icon">👥</span> Друзья</button>
    <button class="nav-btn" onclick="showSection('messages', this)"><span class="nav-icon">💬</span> Сообщения <span class="nav-badge" id="msg-badge" style="display:none">1</span></button>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-user" onclick="showSection('profile', null)">
      <div class="avatar" id="sb-avatar" style="width:36px;height:36px;"></div>
      <div>
        <div class="sidebar-user-name" id="sb-name"></div>
        <div class="sidebar-user-handle" id="sb-handle"></div>
      </div>
    </div>
    <button class="nav-btn" style="margin-top:0.5rem;color:var(--danger)" onclick="doLogout()"><span class="nav-icon">🚪</span> Выйти</button>
  </nav>

  <!-- MAIN -->
  <div class="main-content">

    <!-- FEED -->
    <div id="section-feed" class="section active">
      <div class="section-title">Лента</div>
      <div class="create-post">
        <div class="create-post-top">
          <div class="avatar" id="cp-avatar" style="width:42px;height:42px;"></div>
          <textarea id="post-text" placeholder="Что у тебя на уме?"></textarea>
        </div>
        <div class="create-post-actions">
          <button class="btn-accent" onclick="createPost()">✦ Опубликовать</button>
        </div>
      </div>
      <div id="posts-container"></div>
    </div>

    <!-- PROFILE -->
    <div id="section-profile" class="section">
      <div class="profile-banner"></div>
      <div class="profile-info-row">
        <div class="profile-avatar-wrap">
          <div class="avatar" id="prof-avatar" style="width:90px;height:90px;font-size:2rem;"></div>
        </div>
        <div class="profile-names">
          <div class="profile-name" id="prof-name"></div>
          <div class="profile-handle" id="prof-handle"></div>
          <div class="profile-bio" id="prof-bio"></div>
        </div>
        <button class="profile-edit-btn" onclick="openEditModal()">✏ Редактировать</button>
      </div>
      <div class="profile-stats">
        <div class="stat-item"><div class="stat-num" id="prof-posts">0</div><div class="stat-label">постов</div></div>
        <div class="stat-item"><div class="stat-num" id="prof-friends">0</div><div class="stat-label">друзей</div></div>
        <div class="stat-item"><div class="stat-num" id="prof-likes">0</div><div class="stat-label">лайков</div></div>
      </div>
      <div class="section-title" style="font-size:1rem;margin-bottom:1rem;">Мои посты</div>
      <div id="my-posts-container"></div>
    </div>

    <!-- FRIENDS -->
    <div id="section-friends" class="section">
      <div class="section-title">Люди</div>
      <input class="friends-search" id="friends-search" placeholder="🔍 Поиск людей..." oninput="renderFriends()">
      <div class="friends-grid" id="friends-grid"></div>
    </div>

    <!-- MESSAGES -->
    <div id="section-messages" class="section" style="max-width:100%;padding:0;">
      <div class="messages-layout">
        <div class="conv-list">
          <div class="conv-list-header">Сообщения</div>
          <div id="conv-list-items"></div>
        </div>
        <div class="chat-area" id="chat-area">
          <div class="chat-empty">Выбери диалог слева</div>
        </div>
      </div>
    </div>

  </div>

  <!-- MOBILE NAV -->
  <nav class="mobile-nav">
    <button class="nav-btn" onclick="showSection('feed', this)"><span class="nav-icon">🌊</span>Лента</button>
    <button class="nav-btn" onclick="showSection('profile', this)"><span class="nav-icon">👤</span>Профиль</button>
    <button class="nav-btn" onclick="showSection('friends', this)"><span class="nav-icon">👥</span>Друзья</button>
    <button class="nav-btn" onclick="showSection('messages', this)"><span class="nav-icon">💬</span>Чат</button>
  </nav>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <h3 class="modal-title">Редактировать профиль</h3>
    <div class="modal-field">
      <label>Имя</label>
      <input id="edit-name" type="text">
    </div>
    <div class="modal-field">
      <label>О себе</label>
      <textarea id="edit-bio" rows="3" placeholder="Расскажи о себе..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEditModal()">Отмена</button>
      <button class="btn-accent" onclick="saveProfile()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let state = {
  users: [
    { id: 1, username: 'alex', name: 'Алекс Волков', password: '1234', bio: 'Разработчик 🚀 Люблю кофе и открытый код.', following: [2,3] },
    { id: 2, username: 'masha', name: 'Маша Иванова', password: '1234', bio: 'Дизайнер ✨ Рисую миры из пикселей.', following: [1] },
    { id: 3, username: 'dima', name: 'Дима Петров', password: '1234', bio: 'Музыкант 🎸', following: [] },
    { id: 4, username: 'katya', name: 'Катя Смирнова', password: '1234', bio: 'Путешественница 🌍', following: [1,2] },
  ],
  posts: [
    { id: 1, userId: 2, text: 'Только что закончила новый проект — UI для финтек-стартапа. Когда дизайн и функционал встречаются — это магия! ✨', time: '2ч назад', likes: [], comments: [{ userId: 1, text: 'Потрясающе! Покажи, когда запустят 🔥' }] },
    { id: 2, userId: 3, text: 'Записал новый трек сегодня ночью. Иногда лучшие идеи приходят в 3 часа ночи 🌙🎸', time: '5ч назад', likes: [1], comments: [] },
    { id: 3, userId: 4, text: 'Стамбул — это отдельная вселенная. Успела попробовать 12 видов турецкого завтрака за 2 дня 🥙', time: '1д назад', likes: [1,2,3], comments: [{ userId: 2, text: 'Завидую! 😍' }] },
  ],
  messages: {
    '1-2': [
      { from: 2, text: 'Привет! Ты видел мой новый проект?', time: '10:31' },
      { from: 1, text: 'Да, это огонь! Как долго работала?', time: '10:33' },
    ],
    '1-3': [
      { from: 3, text: 'Слушай, можешь помочь с одним вопросом?', time: 'вчера' },
    ]
  },
  currentUser: null,
  currentChat: null,
  nextPostId: 10,
};

function save() { try { localStorage.setItem('volna', JSON.stringify(state)); } catch(e){} }
function load() { try { const d = localStorage.getItem('volna'); if(d) state = {...state, ...JSON.parse(d), currentUser:null, currentChat:null}; } catch(e){} }
load();

// ═══════════════════════════════════
// AUTH
// ═══════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0)===(tab==='login')));
  document.getElementById('form-login').classList.toggle('active', tab==='login');
  document.getElementById('form-register').classList.toggle('active', tab==='register');
}

function doLogin(e) {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim().replace('@','');
  const pass = document.getElementById('login-pass').value;
  const found = state.users.find(u => u.username === user && u.password === pass);
  if (!found) { document.getElementById('login-err').textContent = 'Неверный логин или пароль'; return; }
  state.currentUser = found.id;
  enterApp();
}

function doRegister(e) {
  e.preventDefault();
  const name = document.getElementById('reg-name').value.trim();
  const user = document.getElementById('reg-user').value.trim().replace('@','');
  const pass = document.getElementById('reg-pass').value;
  if (!name || !user || !pass) { document.getElementById('reg-err').textContent = 'Заполни все поля'; return; }
  if (pass.length < 4) { document.getElementById('reg-err').textContent = 'Пароль минимум 4 символа'; return; }
  if (state.users.find(u => u.username === user)) { document.getElementById('reg-err').textContent = 'Это имя занято'; return; }
  const newUser = { id: Date.now(), username: user, name, password: pass, bio: '', following: [] };
  state.users.push(newUser);
  state.currentUser = newUser.id;
  save();
  enterApp();
}

function doLogout() {
  state.currentUser = null;
  state.currentChat = null;
  document.getElementById('page-auth').classList.add('active');
  document.getElementById('page-app').classList.remove('active');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

// ═══════════════════════════════════
// APP ENTRY
// ═══════════════════════════════════
function enterApp() {
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-app').classList.add('active');
  const me = getMe();
  const initials = me.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  ['sb-avatar','cp-avatar','prof-avatar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = initials; }
  });
  document.getElementById('sb-name').textContent = me.name;
  document.getElementById('sb-handle').textContent = '@' + me.username;
  renderFeed();
  renderProfile();
  renderFriends();
  renderConvList();
  showSection('feed', document.querySelector('.sidebar .nav-btn'));
}

function getMe() { return state.users.find(u => u.id === state.currentUser); }
function getUser(id) { return state.users.find(u => u.id === id); }

// ═══════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name === 'profile') renderProfile();
  if (name === 'messages') { renderConvList(); document.getElementById('msg-badge').style.display='none'; }
}

// ═══════════════════════════════════
// FEED
// ═══════════════════════════════════
function renderFeed() {
  const me = getMe();
  const container = document.getElementById('posts-container');
  const visible = state.posts.filter(p => p.userId === me.id || (me.following||[]).includes(p.userId));
  const sorted = [...visible].reverse();
  container.innerHTML = sorted.length ? sorted.map(p => postHTML(p)).join('') : '<p style="color:var(--text3);text-align:center;padding:2rem">Подпишись на кого-нибудь, чтобы видеть посты</p>';
  attachPostEvents();
}

function postHTML(post) {
  const author = getUser(post.userId);
  const me = getMe();
  const initials = author.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const liked = post.likes.includes(me.id);
  return `<div class="post-card" id="post-${post.id}">
    <div class="post-header">
      <div class="avatar" style="width:40px;height:40px;font-size:0.9rem">${initials}</div>
      <div class="post-meta">
        <div class="post-author">${author.name}</div>
        <div class="post-time">@${author.username} · ${post.time}</div>
      </div>
    </div>
    <div class="post-body">${escHtml(post.text)}</div>
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" data-action="like" data-pid="${post.id}">
        ${liked?'❤️':'🤍'} <span>${post.likes.length}</span>
      </button>
      <button class="action-btn" data-action="comment" data-pid="${post.id}">
        💬 <span>${post.comments.length}</span>
      </button>
      <button class="action-btn" data-action="share" data-pid="${post.id}">↗ Поделиться</button>
    </div>
    <div class="comments-section" id="comments-${post.id}">
      ${post.comments.map(c => commentHTML(c)).join('')}
      <div class="comment-input-row">
        <input type="text" placeholder="Написать комментарий..." id="ci-${post.id}">
        <button onclick="addComment(${post.id})">→</button>
      </div>
    </div>
  </div>`;
}

function commentHTML(c) {
  const u = getUser(c.userId);
  if (!u) return '';
  return `<div class="comment-item">
    <div class="avatar" style="width:28px;height:28px;font-size:0.7rem;flex-shrink:0">${u.name[0]}</div>
    <div class="comment-body">
      <div class="comment-author">${u.name}</div>
      <div class="comment-text">${escHtml(c.text)}</div>
    </div>
  </div>`;
}

function attachPostEvents() {
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = parseInt(btn.dataset.pid);
      const action = btn.dataset.action;
      if (action === 'like') toggleLike(pid);
      if (action === 'comment') toggleComments(pid);
      if (action === 'share') { toast('🔗 Ссылка скопирована!'); }
    });
  });
}

function toggleLike(pid) {
  const post = state.posts.find(p=>p.id===pid);
  const me = getMe();
  if (!post) return;
  const idx = post.likes.indexOf(me.id);
  if (idx === -1) post.likes.push(me.id); else post.likes.splice(idx,1);
  save();
  renderFeed();
  renderProfile();
}

function toggleComments(pid) {
  const el = document.getElementById('comments-' + pid);
  if (el) el.classList.toggle('open');
}

function addComment(pid) {
  const inp = document.getElementById('ci-' + pid);
  const text = inp.value.trim();
  if (!text) return;
  const post = state.posts.find(p=>p.id===pid);
  post.comments.push({ userId: state.currentUser, text });
  save();
  renderFeed();
  // reopen comments
  setTimeout(() => {
    const el = document.getElementById('comments-' + pid);
    if (el) el.classList.add('open');
  }, 10);
}

function createPost() {
  const txt = document.getElementById('post-text').value.trim();
  if (!txt) return;
  const post = { id: state.nextPostId++, userId: state.currentUser, text: txt, time: 'только что', likes: [], comments: [] };
  state.posts.push(post);
  document.getElementById('post-text').value = '';
  save();
  renderFeed();
  renderProfile();
  toast('✦ Пост опубликован!');
}

// ═══════════════════════════════════
// PROFILE
// ═══════════════════════════════════
function renderProfile() {
  const me = getMe();
  const initials = me.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('prof-avatar').textContent = initials;
  document.getElementById('prof-name').textContent = me.name;
  document.getElementById('prof-handle').textContent = '@' + me.username;
  document.getElementById('prof-bio').textContent = me.bio || 'Расскажи о себе...';
  const myPosts = state.posts.filter(p => p.userId === me.id);
  document.getElementById('prof-posts').textContent = myPosts.length;
  document.getElementById('prof-friends').textContent = (me.following||[]).length;
  const totalLikes = myPosts.reduce((s,p)=>s+p.likes.length,0);
  document.getElementById('prof-likes').textContent = totalLikes;
  const c = document.getElementById('my-posts-container');
  c.innerHTML = [...myPosts].reverse().map(p => postHTML(p)).join('') || '<p style="color:var(--text3);padding:1rem">Ты ещё ничего не публиковал</p>';
  attachPostEvents();
}

function openEditModal() {
  const me = getMe();
  document.getElementById('edit-name').value = me.name;
  document.getElementById('edit-bio').value = me.bio || '';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }
function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  const bio = document.getElementById('edit-bio').value.trim();
  if (!name) return;
  const me = state.users.find(u=>u.id===state.currentUser);
  me.name = name; me.bio = bio;
  save();
  closeEditModal();
  renderProfile();
  const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  ['sb-avatar','cp-avatar','prof-avatar'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=initials; });
  document.getElementById('sb-name').textContent = name;
  toast('✅ Профиль обновлён');
}

// ═══════════════════════════════════
// FRIENDS
// ═══════════════════════════════════
function renderFriends() {
  const me = getMe();
  const query = (document.getElementById('friends-search').value||'').toLowerCase();
  const others = state.users.filter(u => u.id !== me.id && (
    !query || u.name.toLowerCase().includes(query) || u.username.toLowerCase().includes(query)
  ));
  const grid = document.getElementById('friends-grid');
  grid.innerHTML = others.map(u => {
    const initials = u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const following = (me.following||[]).includes(u.id);
    return `<div class="friend-card">
      <div class="avatar" style="width:56px;height:56px;font-size:1.3rem;">${initials}</div>
      <div class="friend-name">${u.name}</div>
      <div class="friend-handle">@${u.username}</div>
      <button class="friend-btn ${following?'following':''}" onclick="toggleFollow(${u.id})">${following?'✓ Подписан':'+ Подписаться'}</button>
    </div>`;
  }).join('') || '<p style="color:var(--text3);padding:1rem">Никого не найдено</p>';
}

function toggleFollow(uid) {
  const me = state.users.find(u=>u.id===state.currentUser);
  if (!me.following) me.following = [];
  const idx = me.following.indexOf(uid);
  if (idx===-1) { me.following.push(uid); toast('👥 Подписался!'); }
  else { me.following.splice(idx,1); toast('Отписался'); }
  save();
  renderFriends();
  renderProfile();
  renderFeed();
}

// ═══════════════════════════════════
// MESSAGES
// ═══════════════════════════════════
function getChatKey(uid1, uid2) { return [uid1,uid2].sort((a,b)=>a-b).join('-'); }

function renderConvList() {
  const me = getMe();
  const others = state.users.filter(u=>u.id!==me.id);
  const list = document.getElementById('conv-list-items');
  list.innerHTML = others.map(u => {
    const key = getChatKey(me.id, u.id);
    const msgs = state.messages[key] || [];
    const last = msgs.length ? msgs[msgs.length-1].text : 'Начать чат';
    const initials = u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    return `<div class="conv-item ${state.currentChat===u.id?'active':''}" onclick="openChat(${u.id})">
      <div class="avatar" style="width:38px;height:38px;font-size:0.85rem;flex-shrink:0">${initials}</div>
      <div>
        <div class="conv-name">${u.name}</div>
        <div class="conv-last">${escHtml(last.slice(0,40))}</div>
      </div>
    </div>`;
  }).join('');
}

function openChat(uid) {
  state.currentChat = uid;
  renderConvList();
  const me = getMe();
  const other = getUser(uid);
  const key = getChatKey(me.id, uid);
  const msgs = state.messages[key] || [];
  const initials = other.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('chat-area').innerHTML = `
    <div class="chat-header">
      <div class="avatar" style="width:36px;height:36px;font-size:0.85rem">${initials}</div>
      <div>
        <div style="font-weight:600;font-size:0.95rem">${other.name}</div>
        <div style="font-size:0.78rem;color:var(--text3)">@${other.username}</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-msgs">
      ${msgs.length ? msgs.map(m => `<div class="msg-bubble ${m.from===me.id?'me':'them'}">${escHtml(m.text)}<span class="msg-time">${m.time}</span></div>`).join('') : '<div style="text-align:center;color:var(--text3);font-size:0.88rem;padding:1rem">Начни переписку!</div>'}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Написать..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>`;
  const msgs_el = document.getElementById('chat-msgs');
  if (msgs_el) msgs_el.scrollTop = msgs_el.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || !state.currentChat) return;
  const me = getMe();
  const key = getChatKey(me.id, state.currentChat);
  if (!state.messages[key]) state.messages[key] = [];
  const now = new Date();
  state.messages[key].push({ from: me.id, text, time: `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}` });
  inp.value = '';
  save();
  openChat(state.currentChat);
  renderConvList();
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// Close modal on overlay click
document.getElementById('edit-modal').addEventListener('click', function(e) { if(e.target===this) closeEditModal(); });
</script>
</body>
</html>
